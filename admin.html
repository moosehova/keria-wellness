<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keria Wellness Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#f8f6f2] via-[#fdfcf9] to-[#eef3ed] text-slate-900 p-6 md:p-12">
    <div class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-2 gap-16">
        <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 sticky top-32 h-fit">
            <div class="mb-10 p-6 bg-emerald-50 rounded-2xl border border-emerald-100">
                <h3 class="text-[10px] font-bold text-emerald-800 uppercase tracking-widest mb-4">Manage Categories</h3>
                <div class="flex gap-2">
                    <input type="text" id="new-cat-name" placeholder="New Category Name..." class="flex-grow bg-white border-none rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500">
                    <button onclick="addCategory()" class="bg-emerald-800 text-white px-6 py-2 rounded-xl font-bold text-xs hover:bg-emerald-700 transition-all">Add</button>
                </div>
                <div id="category-tags" class="flex flex-wrap gap-2 mt-4"></div>
            </div>

            <h2 id="form-title" class="text-3xl font-serif text-emerald-950 mb-8">Add New Product</h2>
            <form id="admin-form" class="space-y-6">
                <input type="hidden" id="edit-index" value="-1">

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Product Name</label>
                    <input type="text" id="p-name" class="w-full border-b py-2 outline-none focus:border-emerald-700 bg-transparent">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Price</label>
                        <input type="text" id="p-price" class="w-full border-b py-2 outline-none focus:border-emerald-700 bg-transparent">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Category</label>
                        <select id="p-category" class="w-full border-b py-2 outline-none focus:border-emerald-700 bg-transparent text-sm"></select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Benefits</label>
                    <input type="text" id="p-benefits" placeholder="e.g., Heart Health" class="w-full border-b py-2 outline-none focus:border-emerald-700 bg-transparent">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Product Photo</label>
                    <input type="file" id="product-image-file" accept="image/*" 
                           class="w-full bg-emerald-950/20 border border-emerald-900/30 p-3 rounded-xl text-xs text-emerald-900 cursor-pointer">
                    <p class="text-[9px] text-emerald-700/50 italic">*Upload your product image (Max 2MB recommended)</p>
                    <input type="text" id="p-image" placeholder="Or paste an image URL..." class="w-full border-b py-2 outline-none focus:border-emerald-700 bg-transparent mt-2 text-xs">
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="saveProduct()" class="flex-grow bg-emerald-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-emerald-700 transition-all">
                        Save Changes
                    </button>
                    <button type="button" onclick="resetForm()" class="px-6 bg-slate-100 text-slate-400 rounded-2xl hover:bg-slate-200 transition-all">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="space-y-6">
            <div class="flex justify-between items-end mb-8">
                <h2 class="text-3xl font-serif text-emerald-950">Live Inventory</h2>
                <p class="text-xs text-slate-400 uppercase tracking-widest" id="item-count">0 Items</p>
            </div>
            <div id="inventory-list" class="space-y-3"></div>

            <div class="mt-12 p-8 bg-emerald-950 rounded-[2rem] text-white">
                <p class="text-[10px] font-bold opacity-50 uppercase tracking-[0.3em] mb-4 text-center">Sync Intelligence</p>
                <button onclick="exportCode()" class="w-full bg-emerald-700 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-emerald-600 transition-all">
                    Generate Product Data (js/products.js)
                </button>
                <button onclick="exportData()" class="w-full mt-3 bg-white/10 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-white/20 transition-all border border-white/20">
                    Copy Product Code
                </button>
                <pre id="output-code" class="mt-4 p-4 bg-emerald-900 rounded-xl text-[11px] text-emerald-100 whitespace-pre-wrap break-words hidden"></pre>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/products.js"></script>

    <script>
        let inventory = Array.isArray(products) ? [...products] : [];
        let editingId = null;
        const categorySeed = [...new Set(inventory.map(item => item.category).filter(Boolean))];
        if (!Array.isArray(window.categories) || !window.categories.length) {
            window.categories = categorySeed.length ? categorySeed : ['Nuts', 'Seeds', 'Specialty'];
        }

        // Base64 Image Conversion
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function syncCategories(selectedCategory) {
            const tagContainer = document.getElementById('category-tags');
            const dropdown = document.getElementById('p-category');
            const currentSelected = selectedCategory || dropdown.value || window.categories[0] || '';

            tagContainer.innerHTML = window.categories.map((cat, index) => `
                <span class="bg-white border border-emerald-200 text-emerald-900 px-3 py-1 rounded-full text-[10px] font-bold flex items-center gap-2">
                    ${cat}
                    <button onclick="deleteCategory(${index})" class="text-red-400 hover:text-red-600">&times;</button>
                </span>
            `).join('');

            dropdown.innerHTML = window.categories.map(cat => `
                <option value="${cat}">${cat}</option>
            `).join('');

            if (window.categories.includes(currentSelected)) {
                dropdown.value = currentSelected;
            }
        }

        function hydrateCategoriesFromInventory() {
            const inventoryCategories = [...new Set(inventory.map(item => item.category).filter(Boolean))];
            const merged = [...new Set([...(window.categories || []), ...inventoryCategories])];
            window.categories = merged.length ? merged : ['Nuts', 'Seeds', 'Specialty'];
            syncCategories();
        }

        function addCategory() {
            const input = document.getElementById('new-cat-name');
            const value = input.value.trim();
            if (value !== '' && !window.categories.includes(value)) {
                window.categories.push(value);
                input.value = '';
                syncCategories(value);
                alert('Category List Updated!');
            }
        }

        function deleteCategory(index) {
            if (index < 0 || index >= window.categories.length) {
                return;
            }
            if (confirm('Remove this category? (Note: Products already assigned to this will stay as they are)')) {
                window.categories.splice(index, 1);
                syncCategories();
            }
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            document.getElementById('item-count').innerText = `${inventory.length} Items`;

            list.innerHTML = inventory.map((p, index) => `
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:border-emerald-200 transition-all">
                    <div class="flex items-center gap-4">
                        <img src="${p.image}" class="w-12 h-12 rounded-xl object-cover" onerror="this.src='https://via.placeholder.com/120'">
                        <div>
                            <h4 class="font-bold text-sm text-emerald-950">${p.name}</h4>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">${p.category} • ${p.price}</p>
                            <p class="text-[10px] text-slate-500">${p.benefits || ''}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editProduct(${index})" class="w-8 h-8 flex items-center justify-center rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                        <button onclick="deleteProduct(${index})" class="w-8 h-8 flex items-center justify-center rounded-lg bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-all">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function editProduct(index) {
            const p = inventory[index];
            if (!p) {
                return;
            }

            document.getElementById('form-title').innerText = 'Edit Product';
            document.getElementById('edit-index').value = index;
            editingId = p.id || null;
            document.getElementById('p-name').value = p.name || '';
            document.getElementById('p-price').value = p.price || '';
            if (p.category && !window.categories.includes(p.category)) {
                window.categories.push(p.category);
                syncCategories(p.category);
            }
            document.getElementById('p-category').value = p.category || 'Nuts';
            document.getElementById('p-benefits').value = p.benefits || '';
            // Store current image in the URL field for editing
            document.getElementById('p-image').value = p.image || '';
            // File input cannot be prepopulated for security, reset it
            document.getElementById('product-image-file').value = '';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveProduct() {
            const index = parseInt(document.getElementById('edit-index').value, 10);
            const fileInput = document.getElementById('product-image-file');
            const urlInput = document.getElementById('p-image').value.trim();
            const existingImage = index >= 0 && inventory[index] ? inventory[index].image : '';
            
            let imageData = urlInput || existingImage;
            
            // If a file was uploaded, convert to Base64
            if (fileInput.files && fileInput.files[0]) {
                try {
                    imageData = await getBase64(fileInput.files[0]);
                } catch (error) {
                    alert('Error reading image file: ' + error.message);
                    return;
                }
            }

            const newProduct = {
                name: document.getElementById('p-name').value.trim(),
                price: document.getElementById('p-price').value.trim(),
                category: document.getElementById('p-category').value,
                benefits: document.getElementById('p-benefits').value.trim(),
                image: imageData
            };

            if (!newProduct.name || !newProduct.price || !newProduct.image) {
                alert('Please complete name, price, and upload/paste an image before saving.');
                return;
            }

            if (supabaseClient) {
                const payload = {
                    name: newProduct.name,
                    price: newProduct.price,
                    category: newProduct.category,
                    benefits: newProduct.benefits,
                    image_url: newProduct.image
                };

                let error;
                if (editingId) {
                    ({ error } = await supabaseClient.from('products').update(payload).eq('id', editingId));
                } else {
                    ({ error } = await supabaseClient.from('products').insert([payload]));
                }

                if (error) {
                    alert(`Supabase error: ${error.message}`);
                    return;
                }

                await loadInventory();
            } else {
                if (index === -1) {
                    inventory.push(newProduct);
                } else {
                    inventory[index] = { ...inventory[index], ...newProduct };
                }

                renderInventory();
            }

            if (newProduct.category && !window.categories.includes(newProduct.category)) {
                window.categories.push(newProduct.category);
            }
            resetForm();
            alert(supabaseClient
                ? 'Product saved to live database.'
                : 'Inventory updated locally. Click "Generate Product Data" to export.');
        }

        async function deleteProduct(index) {
            if (index < 0 || index >= inventory.length) {
                return;
            }

            const item = inventory[index];
            if (!confirm(`Delete ${item.name}?`)) {
                return;
            }

            if (supabaseClient && item.id) {
                const { error } = await supabaseClient.from('products').delete().eq('id', item.id);
                if (error) {
                    alert(`Supabase error: ${error.message}`);
                    return;
                }
                await loadInventory();
            } else {
                inventory.splice(index, 1);
                renderInventory();
            }

            resetForm();
        }

        function resetForm() {
            document.getElementById('admin-form').reset();
            document.getElementById('edit-index').value = '-1';
            document.getElementById('form-title').innerText = 'Add New Product';
            editingId = null;
            document.getElementById('product-image-file').value = '';
            document.getElementById('p-image').value = '';
            document.getElementById('p-benefits').value = '';
            syncCategories();
        }

        function buildProductsCode() {
            const portable = inventory.map(item => ({
                id: item.id,
                name: item.name,
                category: item.category,
                price: item.price,
                benefits: item.benefits || '',
                image: item.image
            }));
            return `const products = ${JSON.stringify(portable, null, 4)};`;
        }

        function exportCode() {
            const output = document.getElementById('output-code');
            output.classList.remove('hidden');
            output.textContent = buildProductsCode();
            output.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        async function exportData() {
            const code = buildProductsCode();
            console.log(code);

            try {
                await navigator.clipboard.writeText(code);
                alert('Product code copied. Paste it into js/products.js, then commit and push.');
            } catch (error) {
                alert('Code printed to console. Copy it from DevTools Console and paste into js/products.js.');
            }
        }

        async function loadInventory() {
            if (!supabaseClient) {
                renderInventory();
                hydrateCategoriesFromInventory();
                return;
            }

            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                alert(`Supabase load error: ${error.message}`);
                renderInventory();
                hydrateCategoriesFromInventory();
                return;
            }

            inventory = (data || []).map(item => ({
                id: item.id,
                name: item.name,
                price: item.price,
                category: item.category,
                benefits: item.benefits,
                image: item.image_url
            }));

            renderInventory();
            hydrateCategoriesFromInventory();
        }

        syncCategories();
        loadInventory();
    </script>
</body>
</html>
