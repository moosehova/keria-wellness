<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keria Wellness Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="main-nav">
        <a href="index.html"><img src="images/keria_logo.svg" alt="Keria Wellness" class="nav-logo" onerror="this.style.display='none'"></a>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="products.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="floating-ecosystem" aria-hidden="true">
            <div class="organic-element almond shape-1"></div>
            <div class="organic-element leaf shape-2"></div>
            <div class="organic-element chia shape-3"></div>
            <div class="organic-element almond shape-4"></div>
            <div class="organic-element chia shape-5"></div>
            <div class="organic-element leaf shape-6"></div>
        </div>

        <h1>Keria Wellness Catalog</h1>
        <p>Browse our wellness collection and order instantly via WhatsApp.</p>
    </header>

    <div class="search-shell">
        <div class="search-wrap">
            <input type="text" id="productSearch" placeholder="Search for Sea Moss, Almonds, or Ginger..." class="search-input">
        </div>
    </div>
    <p id="productCount" class="product-count"></p>
    <div id="category-filters" class="filter-bar"></div>
    <div id="product-grid" class="product-grid"></div>

    <div id="productModal" class="product-modal" aria-hidden="true">
        <div class="product-modal__backdrop" data-modal-close></div>
        <div class="product-modal__container" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <button type="button" class="product-modal__close" data-modal-close aria-label="Close product details">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="cart-fab" class="cart-fab hidden" aria-hidden="true">
        <button type="button" id="cart-fab-btn" class="cart-fab__button" aria-label="Open cart">
            <span class="cart-fab__icon">Cart</span>
            <span id="cart-count" class="cart-fab__count">0</span>
        </button>
    </div>

    <div id="cartModal" class="cart-modal" aria-hidden="true">
        <div class="cart-modal__backdrop" data-cart-close></div>
        <div class="cart-modal__container" role="dialog" aria-modal="true" aria-labelledby="cart-title">
            <button type="button" class="product-modal__close" data-cart-close aria-label="Close cart">&times;</button>
            <h2 id="cart-title" class="modal-title">Your Cart</h2>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-actions">
                <button type="button" id="cart-checkout" class="btn-primary">Checkout via WhatsApp</button>
                <button type="button" id="cart-clear" class="btn-secondary">Clear Cart</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
