<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Keria Wellness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="main-nav">
        <a href="index.html"><img src="images/keria_logo.svg" alt="Keria Wellness" class="nav-logo" onerror="this.style.display='none'"></a>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="blog.html">Blog</a>
            <a href="products.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="floating-ecosystem" aria-hidden="true">
            <div class="organic-element almond shape-1"></div>
            <div class="organic-element leaf shape-2"></div>
            <div class="organic-element chia shape-3"></div>
            <div class="organic-element almond shape-4"></div>
            <div class="organic-element chia shape-5"></div>
            <div class="organic-element leaf shape-6"></div>
        </div>

        <h1>Get in Touch</h1>
        <p>Have a question about our products or wholesale orders? We are here to help.</p>
    </header>

    <main class="page-content">
        <div class="contact-wrapper">
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <input type="text" name="name" class="premium-input" placeholder="Your Full Name" required>

                <input type="email" name="email" class="premium-input" placeholder="Your Email Address" required>

                <select name="subject" class="premium-input" required>
                    <option value="" disabled selected>What are you reaching out about?</option>
                    <option value="Product Question">Product Question</option>
                    <option value="Order Status">Order Status</option>
                    <option value="Wholesale Inquiry">Wholesale Inquiry</option>
                </select>

                <textarea name="message" class="premium-input" placeholder="How can we help you today?" required></textarea>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 16px;">Send Message</button>
            </form>
        </div>
    </main>
</body>
</html>
